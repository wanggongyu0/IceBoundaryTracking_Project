# Scenario: regular round ice, usually one dominant connected ice region.
data_path: "./data/exp_001/thermal_data_fixed.mat"
out_dir: "./result/exp_001"
raw_fps: 100.0
sample_fps: 1.0
heat_on_time_in_file_s: 0.0

select_roi_interactively: true
force_reselect_roi: false
roi_config_path: null
roi: [180, 120, 280, 260]
ref_roi: [20, 20, 20, 20]

initial_ice_diameter_mm: 60.0
completion_area_ratio: 0.03
continuous_seconds: 3.0
min_blob_ratio: 0.0005
rate_lag_s: 5.0
use_heating_rate: false
use_temporal_constraint: true
ice_polarity: "low"
ice_shape_mode: "regular"

morph_kernel_size: 3
morph_open_iter_regular: 1
morph_close_iter_regular: 2
morph_fill_holes_regular: true
morph_open_iter_irregular: 1
morph_close_iter_irregular: 1
morph_fill_holes_irregular: true
morph_open_iter_scattered: 0
morph_close_iter_scattered: 0
morph_fill_holes_scattered: false
min_blob_ratio_regular: 0.0005
min_blob_ratio_irregular: 0.0002
min_blob_ratio_scattered: 0.00005
allowed_dilate_iter: 2
area_smooth_window_s: 3.0
save_overlay_every_s: 1.0
visible_complete_interval_s: [110.0, 120.0]
